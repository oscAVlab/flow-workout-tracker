<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Designer v1 — LA PLAZUELA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0b0b0e;--s1:#111115;--s2:#19191f;--s3:#222230;--brd:#2a2a35;--brdh:#3e3e4a;--t:#e8e8f0;--td:#8888a0;--tm:#555570}
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--brdh)}
*{scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
body{background:var(--bg);color:var(--t);font-family:'IBM Plex Mono',monospace;font-size:16px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:320px;min-width:220px;max-width:500px;background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:relative}
.sidebar-hdr{padding:10px 12px 8px;border-bottom:1px solid var(--brd);flex-shrink:0}
.sidebar-hdr h1{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700}
.sidebar-hdr h1 span{color:var(--tm);font-weight:400;font-size:12px}
.sidebar-hdr p{color:var(--td);font-size:10px;margin-top:2px;line-height:1.4}

/* Sidebar resize handle */
.sidebar-resize{position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:30}
.sidebar-resize:hover{background:rgba(74,159,255,0.3)}

/* Collapsible sidebar sections */
.sb-section{border-top:1px solid var(–brd);display:flex;flex-direction:column;min-height:0}
.sb-section.flex-grow{flex:1}
.sb-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;cursor:pointer;user-select:none;background:var(–s2);flex-shrink:0}
.sb-section-hdr:hover{background:var(–s3)}
.sb-section-hdr h3{font-size:14px;color:rgba(232,232,240,0.9);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin:0}
.sb-section-hdr .sb-arrow{font-size:11px;color:rgba(232,232,240,0.9);transition:transform .15s}
.sb-section-hdr .sb-arrow.collapsed{transform:rotate(-90deg)}
.sb-section-body{overflow-y:auto;transition:max-height .2s ease}
.sb-section-body.collapsed{max-height:0!important;overflow:hidden;padding:0!important}

/* Section resize drag */
.sb-drag{height:5px;background:var(–s2);border-top:1px solid var(–brd);cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-drag::after{content:’’;width:24px;height:2px;background:var(–brdh);border-radius:1px}
.sb-drag:hover{background:var(–s3)}

.eq-list{padding:4px}
.cat-lbl{font-size:11px;color:rgba(232,232,240,0.75);letter-spacing:1.5px;text-transform:uppercase;padding:6px 5px 3px;font-weight:600}
.eq-btn{display:block;width:100%;text-align:left;background:var(–s2);border:1px solid var(–brd);border-radius:4px;padding:5px 8px;margin-bottom:2px;cursor:pointer;color:var(–t);font-family:inherit;font-size:11px;transition:border-color .1s;position:relative;opacity:0.8}
.eq-btn:hover{border-color:var(–brdh);background:var(–s3);opacity:1}
.eq-btn.selected{border-color:#4a9fff;background:rgba(74,159,255,0.1);opacity:1}
.eq-btn.used{opacity:.25;pointer-events:none}
.eq-btn .en{font-weight:400;font-size:12px}
.eq-btn .ed{color:var(–td);font-size:10px}
.eq-btn .ec{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:3px}
.stats-bar{padding:6px 10px;font-size:11px;color:var(–td);flex-shrink:0;border-top:1px solid var(–brd);opacity:0.8}
.sr{display:flex;justify-content:space-between;margin-bottom:1px}
.sr .v{color:var(–t);font-weight:600}
.sr.warn .v{color:#ff5c4a}
.preset-bar{padding:6px 10px;background:var(–s2);opacity:0.8}
.rack-cfg{padding:6px 10px;font-size:10px;color:var(–td);opacity:0.8}
.rack-cfg .cfg-row{display:flex;justify-content:space-between;margin-bottom:1px}
.rack-cfg .cfg-row .v{color:var(–t);font-weight:600}
.rack-cfg .cfg-rack{margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(–brd)}
.rack-cfg .cfg-rack:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.rack-cfg .cfg-title{font-size:11px;font-weight:600;margin-bottom:2px}
.preset-row{display:flex;gap:3px;margin-bottom:3px}
.preset-row input{flex:1;background:var(–bg);border:1px solid var(–brd);color:var(–t);padding:3px 6px;border-radius:3px;font-family:inherit;font-size:11px}
.preset-row input:focus{outline:none;border-color:#4a9fff}
.preset-row button{background:var(–s1);border:1px solid var(–brd);color:var(–t);padding:3px 8px;border-radius:3px;font-family:inherit;font-size:11px;cursor:pointer}
.preset-list{max-height:200px;overflow-y:auto}
.pe{display:flex;align-items:center;gap:3px;padding:3px 5px;border:1px solid var(–brd);border-radius:3px;margin-bottom:2px;background:var(–s1);font-size:10px;cursor:pointer;transition:border-color .1s,background .1s}
.pe:hover{border-color:var(–brdh);background:var(–s3)}
.pe.pe-active{border-color:#4a9fff;background:rgba(74,159,255,0.08)}
.pe .pe-drag{cursor:grab;color:var(–tm);font-size:10px;padding:0 2px;user-select:none}
.pe .pe-drag:active{cursor:grabbing}
.pe .pen{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pe .pen input{background:var(–bg);border:1px solid #4a9fff;color:var(–t);font-family:inherit;font-size:10px;padding:1px 4px;border-radius:2px;width:100%}
.pe .pei{color:var(–tm);font-size:9px;margin-right:2px}
.pe .pe-acts{display:flex;gap:1px;opacity:0;transition:opacity .1s}
.pe:hover .pe-acts{opacity:1}
.pe .pa{color:var(–tm);cursor:pointer;font-size:11px;padding:1px 3px;border-radius:2px;background:transparent;border:none;font-family:inherit}
.pe .pa:hover{color:var(–t);background:var(–s3)}
.pe .pa.del:hover{color:#ff5c4a}
.pe-dragging{opacity:0.5;border-color:#4a9fff!important}
.pe-drop-target{border-top:2px solid #4a9fff!important}

/* Confirm modal */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center}
.confirm-box{background:var(–s1);border:1px solid var(–brd);border-radius:6px;padding:16px 20px;min-width:260px;max-width:340px;font-size:12px}
.confirm-box p{margin-bottom:12px;color:var(–t);line-height:1.4}
.confirm-box .cb-btns{display:flex;gap:6px;justify-content:flex-end}
.confirm-box .cb-btn{padding:4px 14px;border-radius:3px;border:1px solid var(–brd);background:var(–s2);color:var(–t);font-family:inherit;font-size:11px;cursor:pointer}
.confirm-box .cb-btn:hover{border-color:var(–brdh);background:var(–s3)}
.confirm-box .cb-btn.danger{border-color:#ff5c4a;color:#ff5c4a}
.confirm-box .cb-btn.danger:hover{background:rgba(255,92,74,0.15)}
.pmsg{font-size:10px;min-height:12px;padding:1px 0}
.pmsg.ok{color:#4aff9f}.pmsg.err{color:#ff5c4a}.pmsg.ld{color:#4a9fff}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.toolbar{display:flex;align-items:center;gap:5px;padding:5px 10px;border-bottom:1px solid var(–brd);background:var(–s1);flex-wrap:wrap}
.toolbar label{font-size:11px;color:var(–td)}
.toolbar select,.toolbar button{background:var(–s2);border:1px solid var(–brd);color:var(–t);padding:3px 8px;border-radius:3px;font-family:inherit;font-size:11px;cursor:pointer}
.toolbar .sep{width:1px;height:16px;background:var(–brd)}
.toolbar .msg{font-size:11px;font-weight:600}
.toolbar .msg.ok{color:#4aff9f}.toolbar .msg.warn{color:#ff5c4a}.toolbar .msg.info{color:#4a9fff}
#opacity-wrap{display:inline-flex;align-items:center;margin-left:-2px}
#sel-opacity{-webkit-appearance:none;appearance:none;background:transparent;outline:none;width:36px;height:12px;vertical-align:middle}
#sel-opacity::-webkit-slider-runnable-track{height:2px;background:rgba(232,232,240,0.15);border-radius:1px}
#sel-opacity::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:rgba(232,232,240,0.8);margin-top:-3px;cursor:pointer}
#sel-opacity::-moz-range-track{height:2px;background:rgba(232,232,240,0.15);border-radius:1px;border:none}
#sel-opacity::-moz-range-thumb{width:8px;height:8px;border-radius:50%;background:rgba(232,232,240,0.8);border:none;cursor:pointer}

.legend-bar{display:flex;gap:10px;padding:4px 10px;border-bottom:1px solid var(–brd);background:var(–s2);font-size:11px;color:var(–td);align-items:center;flex-wrap:wrap}
.legend-bar .ld{display:inline-flex;align-items:center;gap:3px}
.legend-bar .ld .lb{width:14px;height:8px;border:1px dashed;border-radius:2px}

.rack-tabs{display:flex;gap:2px;padding:4px 10px 0;background:var(–s1);border-bottom:1px solid var(–brd);align-items:center}
.rack-tab{padding:5px 14px;font-size:13px;cursor:pointer;border:1px solid var(–brd);border-bottom:none;border-radius:5px 5px 0 0;background:var(–s2);color:var(–td);font-family:inherit;font-weight:500;transition:border-color .15s,color .15s}
.rack-tab.active{background:var(–bg);border-color:var(–brdh)}
.rack-tab .rtag{font-size:10px;margin-left:5px}
.rack-tabs .tabs-spacer{flex:1}
.rack-tabs .rack-mgmt{display:flex;gap:3px;align-items:center;padding-bottom:4px}
.rack-tabs .rack-mgmt button{background:var(–s2);border:1px solid var(–brd);color:var(–td);width:22px;height:22px;border-radius:3px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.rack-tabs .rack-mgmt button:hover{border-color:var(–brdh);color:var(–t)}
.rack-tabs .rack-mgmt button:disabled{opacity:0.3;cursor:default}
.carryon-ref{font-size:9px;color:var(–tm);padding:0 10px 3px;background:var(–s1);border-bottom:1px solid var(–brd)}

.workspace{flex:1;display:flex;overflow:auto;padding:12px;gap:20px;align-items:flex-start;justify-content:center;flex-wrap:wrap;min-height:0}

.view-col{display:flex;flex-direction:column;align-items:center}
.view-label{font-size:12px;color:var(–tm);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-weight:500}
.rack-box{position:relative;border:2px solid var(–brdh);border-radius:5px;background:var(–s1);display:flex;flex-direction:column;gap:0;padding:0;width:fit-content}
.rack-lbl{text-align:center;font-size:11px;color:var(–tm);margin:10px 0;letter-spacing:1px}
.slot-row{display:flex;align-items:center;gap:0}
.slot-lbl-out{font-size:10px;color:var(–tm);font-weight:600;width:28px;text-align:right;padding-right:5px;flex-shrink:0;user-select:none}
.slot{border:1px solid var(–brd);border-radius:3px;position:relative;cursor:crosshair;flex-shrink:0}

.side-rack{border:2px solid var(–brdh);border-radius:5px;background:var(–s1);position:relative}
.sd{position:absolute;left:0;right:0;height:1px;background:var(–brd)}
.si{position:absolute;border-radius:3px;font-size:8px;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;pointer-events:none}
.side-lbl{position:absolute;font-size:10px;color:var(–tm)}

.pi{position:absolute;border-radius:3px;z-index:5;user-select:none;overflow:visible}
.pi.unlocked{cursor:move}
.pi.locked{cursor:default;opacity:.85}
.pi:hover{z-index:10}
.pi .pi-body{width:100%;height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:10px;text-align:center;line-height:1.2;position:relative}
.pi .pn{font-weight:600;pointer-events:none;font-size:11px}
.pi .pd{opacity:.5;pointer-events:none;font-size:9px}
.pi .pb{position:absolute;top:-2px;right:-2px;display:flex;gap:2px;opacity:0;transition:opacity .1s;z-index:20}
.pi:hover .pb{opacity:1}
.pi .pbtn{width:18px;height:18px;border-radius:3px;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);color:#fff}
.pi .pbtn:hover{background:rgba(0,0,0,.95)}
.czone{position:absolute;pointer-events:none;border:1px dashed;opacity:var(–conn-opacity,0.5);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;overflow:hidden;line-height:1}
.czone.audio{border-color:#ff9944;background:rgba(255,153,68,0.08);color:#ff9944}
.czone.data{border-color:#44aaff;background:rgba(68,170,255,0.08);color:#44aaff}
.czone.power{border-color:#ff4466;background:rgba(255,68,102,0.08);color:#ff4466}
.czone.ctrl{border-color:#44ffaa;background:rgba(68,255,170,0.08);color:#44ffaa}

/* Top view: Apollo & HotShot are rectangular (no clip-path).
Trapezoidal profile only appears in side view (rendered via JS). */

.summary-wrap{display:flex;flex-direction:column;border-top:none;background:var(–s1);min-height:80px}
.summary-drag{height:8px;background:var(–s2);border-top:1px solid var(–brd);border-bottom:1px solid var(–brd);cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.summary-drag::after{content:’’;width:40px;height:2px;background:var(–brdh);border-radius:2px}
.summary-drag:hover{background:var(–s3)}
.summary-inner{flex:1;overflow-y:auto;padding:6px 12px}
.summary-inner h3{font-size:10px;color:var(–tm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.summary-inner h3 button{background:var(–s2);border:1px solid var(–brd);color:var(–td);padding:2px 10px;border-radius:3px;font-family:inherit;font-size:10px;cursor:pointer}
.summary-inner h3 button:hover{border-color:var(–brdh);color:var(–t)}
.sum-table{width:100%;border-collapse:collapse;font-size:11px}
.sum-table th{text-align:left;color:var(–tm);font-weight:600;padding:2px 6px;border-bottom:1px solid var(–brd);font-size:10px;letter-spacing:0.5px;white-space:nowrap}
.sum-table td{padding:2px 6px;border-bottom:1px solid rgba(42,42,53,0.5);white-space:nowrap}
.sum-table tr:hover td{background:var(–s2)}
.sum-table .dot{display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:5px;vertical-align:middle}
.sum-table .loc{font-size:10px}
.sum-table .loc.out{color:var(–tm);font-style:italic}
.sum-total{margin-top:5px;font-size:11px;color:var(–td);display:flex;gap:16px;flex-wrap:wrap}

.pwr-warn{color:#ff5c4a;font-weight:600}
.pwr-ok{color:#ff6680}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
.workspace{gap:30px;padding:8px}
}
@media(max-width:900px){
.app{flex-direction:column;height:auto;overflow:auto}
.sidebar{width:100%!important;max-width:100%!important;min-width:0!important;max-height:none;height:auto;border-right:none;border-bottom:1px solid var(–brd)}
.sidebar-resize{display:none}
.sb-section.flex-grow{flex:none}
.sb-section-body{max-height:200px}
.main{flex:none;min-height:0}
.workspace{gap:16px;padding:8px;justify-content:flex-start;flex-direction:column;align-items:center;overflow:visible;flex:none;height:auto}
.view-col{width:100%;align-items:center}
.rack-box{max-width:100%;overflow-x:auto}
.summary-wrap{height:auto!important;max-height:300px}
body{height:auto;overflow:auto}
}
@media(max-width:600px){
.toolbar{gap:3px;padding:4px 6px;flex-wrap:wrap}
.toolbar label{font-size:9px}
.toolbar select,.toolbar button{font-size:9px;padding:2px 4px}
.legend-bar{font-size:9px;gap:4px;padding:3px 6px}
.rack-tab{padding:3px 8px;font-size:10px}
.sum-table{font-size:9px}
.sum-table th{font-size:8px;padding:2px 4px}
.sum-table td{padding:2px 4px}
.eq-btn .ed{font-size:8px}
.workspace{padding:4px;gap:12px}
.view-label{font-size:10px}
.sidebar-hdr p{font-size:8px}
.pi .pn{font-size:8px}
.pi .pd{font-size:7px}
}
</style>

</head>
<body>
<div class="app">
<div class="sidebar" id="sidebar">
  <div class="sidebar-resize" id="sidebar-resize"></div>
  <div class="sidebar-hdr">
    <h1>Rack Designer <span>v1</span></h1>
    <p>Click equipo → click rack · Drag mover<br>🔄 rotar · 📐 conect · ⬆⬇ techo/piso · 🔒 fijar · ✕ quitar</p>
  </div>

  <!-- Presets Section -->

  <div class="sb-section" id="wrap-sec-preset" style="min-height:60px">
    <div class="sb-section-hdr" onclick="togSection('sec-preset')"><h3>Presets</h3><span class="sb-arrow" id="arr-sec-preset">▼</span></div>
    <div class="sb-section-body" id="sec-preset" style="flex:1;overflow-y:auto">
      <div class="preset-bar">
        <div class="preset-row"><input type="text" id="pname" placeholder="Nombre..."><button onclick="savePreset()">💾</button></div>
        <div class="pmsg" id="pmsg"></div>
        <div class="preset-list" id="plist"></div>
      </div>
    </div>
  </div>
  <div class="sb-drag" data-resize="sec-preset,sec-rack"></div>

  <!-- Rack Config Section -->

  <div class="sb-section" id="wrap-sec-rack">
    <div class="sb-section-hdr" onclick="togSection('sec-rack')"><h3>Configuración Racks</h3><span class="sb-arrow" id="arr-sec-rack">▼</span></div>
    <div class="sb-section-body" id="sec-rack">
      <div class="rack-cfg" id="rack-cfg"></div>
    </div>
  </div>

  <!-- Stats (below rack config) -->

  <div class="stats-bar" id="stats"></div>
  <div class="sb-drag" data-resize="sec-rack,sec-eq"></div>

  <!-- Equipos Section -->

  <div class="sb-section flex-grow" id="wrap-sec-eq">
    <div class="sb-section-hdr" onclick="togSection('sec-eq')"><h3>Dispositivos</h3><span class="sb-arrow" id="arr-sec-eq">▼</span></div>
    <div class="sb-section-body" id="sec-eq" style="flex:1;overflow-y:auto">
      <div class="eq-list" id="eq-list"></div>
    </div>
  </div>
</div>
<div class="main">
  <div class="toolbar">
    <label>U:</label>
    <select id="sel-u" onchange="rebuild()"><option value="2">2U</option><option value="3">3U</option><option value="4">4U</option></select>
    <label>Profundidad:</label>
    <select id="sel-d" onchange="rebuild()">
      <option value="228">9"</option>
      <option value="254">10"</option>
      <option value="305">12"</option>
      <option value="330">13"</option>
      <option value="356">14"</option>
    </select>
    <label>Conectores:</label>
    <select id="sel-conn" onchange="updateConnOpacityVis();rebuild()"><option value="real">Reales</option><option value="L">L (25mm)</option><option value="rect">Rectos (60mm)</option><option value="none">Ocultar</option></select>
    <span id="opacity-wrap"><input type="range" id="sel-opacity" min="5" max="100" value="50" oninput="rebuild()"></span>
    <label>Energía:</label>
    <select id="sel-cond-mode" onchange="onCondModeChange()" style="font-size:10px">
      <option value="per-rack">Por rack</option>
      <option value="shared">Compartido A+B</option>
    </select>
    <select id="sel-cond" onchange="rebuild()">
      <option value="none">Sin acondicionador</option>
      <option value="furman">Furman M-10x E</option>
      <option value="furman210">Furman AC-210 A E</option>
      <option value="pgp">BLA PG-P</option>
    </select>
    <div class="sep"></div>
    <button onclick="clearAll()">Vaciar</button>
    <span class="msg" id="msg"></span>
  </div>
  <div class="legend-bar">
    <span style="color:var(--tm);font-weight:600">CONECTORES:</span>
    <span class="ld"><span class="lb" style="border-color:#ff9944;background:rgba(255,153,68,0.2)"></span>Audio</span>
    <span class="ld"><span class="lb" style="border-color:#44aaff;background:rgba(68,170,255,0.2)"></span>Data</span>
    <span class="ld"><span class="lb" style="border-color:#ff4466;background:rgba(255,68,102,0.2)"></span>Power</span>
    <span class="ld"><span class="lb" style="border-color:#44ffaa;background:rgba(68,255,170,0.2)"></span>Control</span>
    <div class="sep"></div>
    <span style="color:var(--tm)">▲top=trasera ▼bottom=frente</span>
  </div>
  <div class="rack-tabs" id="rack-tabs"></div>
  <div class="carryon-ref" id="carryon-ref">📐 Carry-on máx: 560×355×230mm (22×14×9") — IATA estándar</div>
  <div class="workspace" id="workspace"></div>
  <div class="summary-wrap" id="summary-wrap" style="height:160px">
    <div class="summary-drag" id="summary-drag"></div>
    <div class="summary-inner" id="summary"></div>
  </div>
</div>
</div>
<script>
// ===== POWER CONDITIONERS (max W / max A @ 230V) =====
const CONDITIONERS={

// ===== RACK COLORS =====
const RACK_COLORS=[’#22d4bf’,’#d466ff’,’#ff9944’,’#44aaff’,’#4aff9f’,’#ff6680’];
function rackColor(key){
const keys=Object.keys(racks);
const idx=keys.indexOf(key);
return RACK_COLORS[idx%RACK_COLORS.length];
}
function rackLabel(key){return’Rack ’+key.toUpperCase()}

// ===== TWO RACK STATE =====
let racks={
a:{u:2,d:228,conditioner:‘none’,items:[]},
b:{u:2,d:228,conditioner:‘none’,items:[]}
};
let sharedCondMode=false; // false = per-rack, true = shared A+B
let activeRack=‘a’;
let selId=null,drag=null,dOff={x:0,y:0};
let activePresetName=’’; // Track current preset name for export

function cur(){return racks[activeRack]}
function useCount(id){return Object.values(racks).reduce((sum,r)=>sum+r.items.filter(i=>i.id===id).length,0)}
function isUsed(id){return useCount(id)>0}
function rotDims(eq,rot){return(rot===90||rot===270)?{w:eq.d,d:eq.w}:{w:eq.w,d:eq.d}}
function rotSide(s,rot){return(s+rot/90)%4}

// ===== POWER VALIDATION =====
function calcRackPower(rack){
let totalW=0,totalA=0;
for(const it of rack.items){
const eq=gEq(it.id);
if(eq){totalW+=eq.watts||0;totalA+=eq.amps||0}
}
return{totalW,totalA};
}

function calcCombinedPower(){
let totalW=0,totalA=0;
for(const r of Object.values(racks)){
const p=calcRackPower(r);
totalW+=p.totalW;totalA+=p.totalA;
}
return{totalW,totalA};
}

function getPowerStatus(rack){
const cond=CONDITIONERS[rack.conditioner||‘none’];
if(sharedCondMode){
const pw=calcCombinedPower();
const firstKey=Object.keys(racks)[0];
const sharedCond=CONDITIONERS[racks[firstKey].conditioner||‘none’];
const overW=pw.totalW>sharedCond.maxW;
const overA=pw.totalA>sharedCond.maxA;
return{…pw,cond:sharedCond,overW,overA,over:overW||overA};
}
const pw=calcRackPower(rack);
const overW=pw.totalW>cond.maxW;
const overA=pw.totalA>cond.maxA;
return{…pw,cond,overW,overA,over:overW||overA};
}

function onCondModeChange(){
sharedCondMode=document.getElementById(‘sel-cond-mode’).value===‘shared’;
if(sharedCondMode){
// Sync all racks to same conditioner
const c=cur().conditioner;
for(const k of Object.keys(racks))racks[k].conditioner=c;
}
rebuild();
}

function switchRack(r){
activeRack=r;
renderRackTabs();
document.getElementById(‘sel-u’).value=cur().u;
document.getElementById(‘sel-d’).value=cur().d;
document.getElementById(‘sel-cond’).value=cur().conditioner||‘none’;
selId=null;
rebuild();
}

function renderRackTabs(){
const container=document.getElementById(‘rack-tabs’);
const keys=Object.keys(racks);
let html=’’;
for(const k of keys){
const col=rackColor(k);
const isActive=k===activeRack;
const cnt=racks[k].items.length;
const tag=cnt?` (${cnt})`:’’;
html+=`<div class="rack-tab${isActive?' active':''}" onclick="switchRack('${k}')" style="color:${isActive?col:col+'88'};border-color:${isActive?col+'66':'var(--brd)'}">${rackLabel(k)}<span class="rtag" style="color:${col}88">${tag}</span></div>`;
}
html+=`<div class="tabs-spacer"></div>`;
html+=`<div class="rack-mgmt">`;
html+=`<button onclick="addRack()" title="Añadir rack"${keys.length>=6?' disabled':''}>+</button>`;
html+=`<button onclick="removeRack()" title="Quitar rack"${keys.length<=1?' disabled':''}>−</button>`;
html+=`</div>`;
container.innerHTML=html;
}

function addRack(){
const keys=Object.keys(racks);
if(keys.length>=6)return;
// Find next letter
const letters=‘abcdefghijklmnopqrstuvwxyz’;
let newKey=’’;
for(const l of letters){if(!racks[l]){newKey=l;break}}
if(!newKey)return;
racks[newKey]={u:2,d:228,conditioner:‘none’,items:[]};
switchRack(newKey);
}

function removeRack(){
const keys=Object.keys(racks);
if(keys.length<=1)return;
const rk=activeRack;
const label=rackLabel(rk);
showConfirm(`¿Eliminar <strong>${label}</strong> y todos sus equipos?`,()=>{
delete racks[rk];
const remaining=Object.keys(racks);
switchRack(remaining[0]);
},true);
}

function renderWorkspace(){
const ws=document.getElementById(‘workspace’);
const r=cur();
const rD=r.d;
const col=rackColor(activeRack);

// ===== RESPONSIVE SCALE =====
// Compute scale to fit within available workspace width
// Top view needs: labelW(28px) + RW*S + borders(~8px) + padding
// We want this to fit within the workspace width
const wsWidth=ws.clientWidth||ws.offsetWidth||600;
const labelW=32; // slot label + gap
const pad=32; // padding + borders
const maxFitS=(wsWidth-labelW-pad)/RW; // scale that makes top view fit exactly
const S=Math.min(SC,maxFitS); // cap at 0.95, shrink on small screens
curScale=S; // store for interaction handlers
const tH=r.u*UH; // total height in mm

// Carry-on reference dims in mm (IATA: 560×355×230mm = 22×14×9”)
const CARRYON={w:560,d:355,h:230};

const slotW=Math.round(RW*S);
// Build top view: W (horizontal) × D (vertical)
let topHTML=`<div class="view-col"><div class="view-label">Vista superior · <span style="color:${col}">${rackLabel(activeRack)}</span></div> <div class="rack-lbl" style="margin-bottom:14px">▲ trasera</div> <div class="rack-box" id="rack-box" style="border-color:${col}44">`;
for(let s=r.u-1;s>=0;s–){
topHTML+=`<div class="slot-row"><span class="slot-lbl-out">${s+1}U</span><div class="slot" data-slot="${s}" style="width:${slotW}px;height:${Math.round(rD*S)}px"></div></div>`;
}
topHTML+=`</div><div class="rack-lbl" style="margin-top:14px">▼ frente</div></div>`;

// Side view: D (horizontal) × H (vertical) — FIXED scale, true proportions
const FS=SC; // fixed scale for side/front views (never responsive-shrunk)
const sideH=Math.round(tH*FS);
const sideW=Math.round(rD*FS);
let sideHTML=`<div class="view-col"><div class="view-label">Vista lateral</div> <div class="side-rack" id="side-rack" style="width:${sideW}px;height:${sideH}px;border-color:${col}44">`;
for(let i=1;i<r.u;i++){
sideHTML+=`<div class="sd" style="top:${Math.round((r.u-i)*UH*FS)}px"></div>`;
}
sideHTML+=`<div class="side-lbl" style="left:2px;bottom:-16px">frente</div>`;
sideHTML+=`<div class="side-lbl" style="right:2px;bottom:-16px">atrás</div>`;
for(const it of r.items){
const eq=gEq(it.id);if(!eq)continue;
const isCeil=!!it.ceil;
let bMM=isCeil?((it.slot+1)*UH-eq.h):(it.slot*UH);
const tp=Math.round(sideH-(bMM+eq.h)*FS);
const rd=rotDims(eq,it.rot||0);
const lp=Math.round((rD-(it.z||0)-rd.d)*FS);
const wp=Math.round(rd.d*FS);
const hp=Math.max(Math.round(eq.h*FS),4);
let extraStyle=’’;
if(eq.shape){
const rot=it.rot||0;const connSide=(2+rot/90)%4;
if(connSide===2||connSide===0){
const fl=(connSide===0);
if(eq.shape===‘trap-apollo’){extraStyle=fl?‘clip-path:polygon(0% 0%,50% 0%,50% 40%,100% 40%,100% 100%,0% 100%);’:‘clip-path:polygon(0% 40%,50% 40%,50% 0%,100% 0%,100% 100%,0% 100%);’}
else if(eq.shape===‘trap-hotshot’){extraStyle=fl?‘clip-path:polygon(0% 0%,55% 0%,55% 50%,100% 50%,100% 100%,0% 100%);’:‘clip-path:polygon(0% 50%,45% 50%,45% 0%,100% 0%,100% 100%,0% 100%);’}
}
}
sideHTML+=`<div class="si" style="left:${lp}px;top:${tp}px;width:${wp}px;height:${hp}px;background:${eq.col}33;border:1px solid ${eq.col}88;color:${eq.col};${extraStyle}"><span>${hp>=10?eq.name.split(' ')[0]:''}</span></div>`;
}
sideHTML+=`</div> <div style="font-size:10px;color:var(--tm);margin-top:8px;text-align:center"> ${rD}mm × ${Math.round(tH)}mm </div></div>`;

// Front view: W (horizontal) × H (vertical) — FIXED scale
const frontW=Math.round(RW*FS);
let frontHTML=`<div class="view-col"><div class="view-label">Vista frontal</div> <div class="side-rack" style="width:${frontW}px;height:${sideH}px;border-color:${col}44">`;
for(let i=1;i<r.u;i++){
frontHTML+=`<div class="sd" style="top:${Math.round((r.u-i)*UH*FS)}px"></div>`;
}
for(const it of r.items){
const eq=gEq(it.id);if(!eq)continue;
const rd=rotDims(eq,it.rot||0);
const isCeil=!!it.ceil;
let bMM=isCeil?((it.slot+1)*UH-eq.h):(it.slot*UH);
const tp=Math.round(sideH-(bMM+eq.h)*FS);
const lp=Math.round(it.x*FS);
const wp=Math.round(rd.w*FS);
const hp=Math.max(Math.round(eq.h*FS),4);
frontHTML+=`<div class="si" style="left:${lp}px;top:${tp}px;width:${wp}px;height:${hp}px;background:${eq.col}33;border:1px solid ${eq.col}88;color:${eq.col}"><span>${hp>=10?eq.name.split(' ')[0]:''}</span></div>`;
}
frontHTML+=`</div> <div style="font-size:10px;color:var(--tm);margin-top:8px;text-align:center"> ${RW}mm × ${Math.round(tH)}mm </div></div>`;

ws.innerHTML=topHTML+sideHTML+frontHTML;

// Update carry-on reference
const fits=RW<=CARRYON.w && tH<=CARRYON.h && rD<=CARRYON.d;
const coEl=document.getElementById(‘carryon-ref’);
if(coEl){
coEl.innerHTML=`📐 Carry-on: 560×355×230mm — Rack: ${RW}×${Math.round(tH)}×${rD}mm — ${fits?'<span style="color:#4aff9f">✓ Cabe</span>':'<span style="color:#ff5c4a">✕ No cabe</span>'}`;
}

// Attach events to slots
document.querySelectorAll(’.slot’).forEach(sl=>{
sl.addEventListener(‘mousedown’,e=>onSlotDown(e,+sl.dataset.slot));
sl.addEventListener(‘mousemove’,onMove);
});
document.addEventListener(‘mouseup’,onUp);

// Place items
for(const it of r.items)placeVis(it);
}

function onSlotDown(e,s){
const t=e.target.closest(’.pi’);
if(t){
if(e.target.classList.contains(‘pbtn’))return;
// Check if it’s a PSU element
if(t.dataset.psu){
const it=cur().items.find(i=>(i.iid||i.id)===t.dataset.psu);
if(it){
drag={*psu:true,item:it,el:t};
const r=t.getBoundingClientRect();
dOff={x:e.clientX-r.left,y:e.clientY-r.top};
t.style.zIndex=‘20’;e.preventDefault();return;
}
}
const it=cur().items.find(i=>(i.iid||i.id)===t.dataset.iid);
if(!it||it.locked)return;
drag=it;
const r=t.getBoundingClientRect();
dOff={x:e.clientX-r.left,y:e.clientY-r.top};
t.style.zIndex=‘20’;e.preventDefault();return;
}
if(!selId)return;
const eq=gEq(selId);if(!eq)return;
const sl=e.currentTarget,rc=sl.getBoundingClientRect();
const rd=rotDims(eq,0);
let x=Math.round((e.clientX-rc.left)/curScale-rd.w/2);
let z=Math.round((e.clientY-rc.top)/curScale-rd.d/2);
x=Math.max(0,Math.min(RW-rd.w,x));
z=Math.max(0,Math.min(cur().d-rd.d,z));
const iid=eq.id+’*’+Date.now();
cur().items.push({id:eq.id,iid,slot:s,x,z,rot:0,locked:false,showConn:true});
// Auto-select conditioner when placing a power device
if(eq.cat===‘pwr’&&CONDITIONERS[eq.id]){
cur().conditioner=eq.id;
document.getElementById(‘sel-cond’).value=eq.id;

}

}

}

function delPreset(id,name){
showConfirm(`¿Eliminar <strong>${name}</strong>?<br>Esta acción no se puede deshacer.`,async()=>{
try{
await sbFetch(‘rack_presets?id=eq.’+id,{method:‘DELETE’});
loadPresets();
const m=document.getElementById(‘pmsg’);m.textContent=‘Eliminado’;m.className=‘pmsg ok’;
}catch(e){}
},true);
}

async function applyPreset(id){
const m=document.getElementById(‘pmsg’);m.className=‘pmsg ld’;m.textContent=’…’;
try{
const d=await sbFetch(‘rack_presets?id=eq.’+id+’&select=*’);
if(!d||!d.length)throw new Error(’’);
const p=d[0];
activePresetName=p.name; // Track for export
const pd=typeof p.items===‘string’?JSON.parse(p.items):p.items;
if(pd.a){
// Reconstruct racks from preset — support dynamic rack keys
const rackKeys=Object.keys(pd).filter(k=>k.length===1&&k>=‘a’&&k<=‘z’&&pd[k]&&typeof pd[k]===‘object’&&pd[k].items!==undefined);
if(rackKeys.length>0){
// Clear existing racks and load from preset
racks={};
for(const k of rackKeys){
racks[k]=pd[k];
if(!racks[k].conditioner)racks[k].conditioner=‘none’;
racks[k].items.forEach(i=>{if(!i.rot)i.rot=0;if(i.showConn===undefined)i.showConn=true;if(i.ceil===undefined)i.ceil=false;if(!i.iid)i.iid=i.id+’*’+Math.random().toString(36).slice(2,8)});
}
}else{
// Legacy format with just a,b
racks={a:pd.a||{u:2,d:228,conditioner:‘none’,items:[]},b:pd.b||{u:2,d:228,conditioner:‘none’,items:[]}};
for(const k of Object.keys(racks)){
if(!racks[k].conditioner)racks[k].conditioner=‘none’;
racks[k].items.forEach(i=>{if(!i.rot)i.rot=0;if(i.showConn===undefined)i.showConn=true;if(i.ceil===undefined)i.ceil=false;if(!i.iid)i.iid=i.id+’*’+Math.random().toString(36).slice(2,8)});
}
}
// Restore connector mode
if(pd.connMode){document.getElementById(‘sel-conn’).value=pd.connMode}
// Restore shared cond mode
if(pd.sharedCondMode!==undefined){
sharedCondMode=!!pd.sharedCondMode;
document.getElementById(‘sel-cond-mode’).value=sharedCondMode?‘shared’:‘per-rack’;
}
switchRack(pd.active||Object.keys(racks)[0]);
}else{
cur().u=p.rack_u;cur().d=p.rack_depth;
cur().items=Array.isArray(pd)?pd:[];
cur().items.forEach(i=>{if(!i.rot)i.rot=0;if(i.showConn===undefined)i.showConn=true;if(!i.iid)i.iid=i.id+’_’+Math.random().toString(36).slice(2,8)});
document.getElementById(‘sel-u’).value=cur().u;
document.getElementById(‘sel-d’).value=cur().d;
rebuild();
}
// Highlight active preset
document.querySelectorAll(’.pe’).forEach(p=>p.classList.remove(‘pe-active’));
const el=document.querySelector(`.pe[data-pid="${id}"]`);
if(el)el.classList.add(‘pe-active’);
m.className=‘pmsg ok’;m.textContent=’✓ ’+p.name;
}catch(e){m.className=‘pmsg err’;m.textContent=‘Error’}
}

loadPresets();
</script>

</body>
</html>
