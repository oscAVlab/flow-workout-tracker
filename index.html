<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0E0D11;
            --bg-secondary: #1a191f;
            --bg-tertiary: #24232b;
            --text-primary: #f5f5f5;
            --text-secondary: #b8b8b8;
            --accent: #c084fc;
            --success: #6ee659;
        }
        html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; }
        body { display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--bg-tertiary); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-title { font-size: 18px; font-weight: 700; color: var(--accent); }
        .sync-indicator { display: flex; align-items: center; gap: 4px; font-size: 8px; color: var(--text-secondary); }
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bg-tertiary); transition: background 0.3s; }
        .sync-dot.ok { background: var(--success); }
        .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
        .sync-dot.error { background: #f87171; }
        .date-nav { display: flex; gap: 6px; align-items: center; }
        .date-btn { padding: 3px 8px; background: var(--bg-tertiary); border: 1px solid var(--bg-primary); color: var(--text-secondary); border-radius: 3px; cursor: pointer; font-size: 9px; transition: all 0.2s; }
        .date-btn.today { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .current-date { color: var(--text-primary); font-weight: 600; font-size: 10px; min-width: 80px; text-align: center; }

        /* CALENDARIO */
        .calendar-section { background: var(--bg-secondary); border-bottom: 1px solid var(--bg-tertiary); padding: 10px 16px; flex-shrink: 0; }
        .calendar-title { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
        .calendar-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day {
            height: 40px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--bg-tertiary); border-radius: 3px;
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-size: 10px; cursor: pointer; transition: all 0.15s; position: relative; font-weight: 500;
        }
        .calendar-day:hover { background: #2e2d37; color: var(--text-primary); border-color: var(--accent); }
        .calendar-day.today { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .calendar-day.selected { background: rgba(192,132,252,0.22); color: var(--accent); border-color: var(--accent); }
        .calendar-day.today.selected { background: var(--accent); color: var(--bg-primary); }
        .calendar-day.workout-done::after { content: '✓'; position: absolute; top: 1px; right: 2px; font-size: 7px; color: var(--success); }
        .calendar-day.fasting-done::before { content: '✓'; position: absolute; top: 1px; left: 2px; font-size: 7px; color: rgba(110,230,89,0.5); }

        /* AYUNO */
        .fasting-panel { background: var(--bg-secondary); border-bottom: 1px solid var(--bg-tertiary); padding: 12px 16px; flex-shrink: 0; }
        .fasting-panel-title { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
        .fasting-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
        .fasting-display { display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
        .fasting-time { font-size: 22px; font-weight: 700; color: rgba(110, 230, 89, 0.5); font-family: 'Courier New', monospace; }
        .fasting-stage-name { font-size: 10px; color: var(--accent); font-weight: 700; }
        .fasting-stage-desc { font-size: 8px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; max-width: 220px; }
        .fasting-meta { font-size: 8px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
        .fasting-log { font-size: 8px; color: var(--success); margin-top: 3px; font-weight: 600; }
        .fasting-controls { display: flex; gap: 6px; align-items: center; margin-left: auto; }
        .btn-fasting { padding: 7px 16px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; transition: all 0.2s; border: 1px solid transparent; }
        .btn-fasting-start { background: var(--success); color: var(--bg-primary); border-color: var(--success); }
        .btn-fasting-start.active { background: #f87171; border-color: #f87171; }
        .btn-fasting-close { background: var(--bg-tertiary); color: var(--accent); border-color: var(--accent); }
        .btn-fasting-close:hover { background: var(--accent); color: var(--bg-primary); }
        .btn-fasting-reset { background: var(--bg-tertiary); color: var(--text-secondary); border-color: var(--bg-primary); }
        .btn-fasting-reset:hover { color: var(--text-primary); border-color: var(--accent); }
        .fasting-offset-wrap { display: flex; align-items: center; gap: 3px; }
        .offset-label { font-size: 7px; color: var(--text-secondary); text-transform: uppercase; }
        .offset-input { width: 28px; padding: 4px 3px; background: var(--bg-tertiary); border: 1px solid var(--bg-primary); color: var(--text-primary); border-radius: 3px; font-size: 10px; text-align: center; font-family: 'Courier New', monospace; }
        .offset-input:focus { outline: none; border-color: var(--accent); }
        .offset-sep { color: var(--text-secondary); font-size: 10px; }
        .btn-offset-apply { padding: 4px 7px; background: var(--bg-tertiary); border: 1px solid var(--accent); border-radius: 3px; color: var(--accent); font-size: 9px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-offset-apply:hover { background: var(--accent); color: var(--bg-primary); }

        /* Barra progreso ayuno */
        .fasting-bar-wrap { width: 100%; }
        .fasting-track { width: 100%; height: 16px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; border: 1px solid var(--bg-primary); }
        .fasting-fill { height: 100%; width: 0%; transition: width 0.5s ease; border-radius: 4px;
            background: linear-gradient(90deg, #3b82f6 0%, #6ee659 25%, #c084fc 65%, #e5c3ff 100%); }
        .fasting-ticks { display: flex; position: relative; height: 28px; margin-top: 3px; }
        .fasting-tick { position: absolute; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .fasting-tick-line { width: 1px; height: 4px; background: var(--bg-tertiary); }
        .fasting-tick.reached .fasting-tick-line { background: var(--accent); }
        .fasting-tick-label { font-size: 6.5px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; text-align: center; line-height: 1.2; }
        .fasting-tick.reached .fasting-tick-label { color: var(--accent); }
        .fasting-tick.current .fasting-tick-label { color: var(--success); }
        .fasting-tick.current .fasting-tick-line { background: var(--success); width: 2px; }

        /* MAIN */
        .main-content { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow: hidden; padding: 12px; }

        .stats-panel { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); border-radius: 4px; padding: 10px; flex-shrink: 0; }
        .stats-title { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .stat-box { background: var(--bg-tertiary); padding: 6px; border-radius: 3px; text-align: center; }
        .stat-value { font-size: 16px; font-weight: 700; color: var(--accent); font-family: 'Courier New', monospace; }
        .stat-label { font-size: 7px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; }

        /* ENTRENAMIENTO */
        .workout-panel { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 0; overflow: hidden; }
        .workout-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
        .workout-header-left { display: flex; align-items: center; gap: 10px; }
        .workout-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-primary); }
        .routine-selector { display: flex; gap: 4px; }
        .routine-btn { padding: 5px 10px; background: var(--bg-tertiary); border: 1px solid var(--bg-primary); color: var(--text-secondary); border-radius: 3px; cursor: pointer; font-size: 9px; font-weight: 700; transition: all 0.2s; }
        .routine-btn:hover { border-color: var(--accent); }
        .routine-btn.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .routine-check { font-size: 7px; color: var(--success); margin-left: 1px; }
        .routine-btn.active .routine-check { color: var(--bg-primary); }
        .workout-actions { display: flex; gap: 6px; }
        .btn-workout { padding: 7px 16px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; transition: all 0.2s; }
        .btn-iniciar { background: var(--success); color: var(--bg-primary); border: none; }
        .btn-iniciar.paused { background: #f87171; }
        .btn-iniciar:hover { opacity: 0.9; }
        .btn-reset-w { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-tertiary); }
        .btn-reset-w:hover { border-color: var(--accent); }
        .btn-iniciar.done { background: #7c3aed; color: #fff; }
        .workout-total { font-size: 9px; color: var(--text-secondary); font-family: 'Courier New', monospace; display: flex; align-items: center; gap: 4px; }
        .workout-total-time { font-size: 13px; font-weight: 700; color: rgba(110,230,89,0.5); }
        .workout-meta { font-size: 8px; color: var(--text-secondary); line-height: 1.5; padding: 0 2px; flex-shrink: 0; }
        .workout-meta span.accent { color: var(--accent); font-weight: 600; }

        .timeline-wrapper { flex: 1; display: flex; flex-direction: column; background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); border-radius: 4px; overflow: hidden; min-height: 0; }
        .timeline-container { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .timeline-block { background: var(--bg-tertiary); border: 1px solid var(--bg-primary); border-radius: 3px; padding: 10px; flex-shrink: 0; min-height: 80px; display: flex; flex-direction: column; }
        .timeline-block.completed { border-color: var(--success); opacity: 0.5; }
        .block-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
        .block-info { flex: 1; min-width: 0; }
        .block-title { font-size: 10px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; margin-bottom: 2px; }
        .block-exercises { font-size: 9px; color: var(--text-primary); line-height: 1.3; }
        .block-timer { text-align: right; flex-shrink: 0; }
        .timer-main { font-size: 14px; font-weight: 700; color: rgba(110, 230, 89, 0.5); font-family: 'Courier New', monospace; }
        .timer-type { font-size: 7px; color: var(--text-secondary); }
        .btn-mark {
            width: 100%; height: 24px; margin-top: 6px;
            position: relative; overflow: hidden;
            background: var(--bg-primary); border: 1px solid #333;
            border-radius: 3px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 9px; font-weight: 700;
            letter-spacing: 0.05em; transition: color 0.2s, border-color 0.2s;
        }
        .btn-mark-fill {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(192, 132, 252, 0.70);
            transition: width 0.1s linear;
            pointer-events: none; border-radius: 3px;
        }
        .btn-mark-fill.done { background: rgba(110, 230, 89, 0.70); width: 100% !important; }
        .btn-mark.done { color: var(--success); border-color: var(--success); }
        .btn-mark span { position: relative; z-index: 1; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .timer-active { animation: pulse 1s infinite; }
    </style>
</head>

            { id: "c5f", title: "Ciclo 5 Fuerza", duration: 300, type: "strength", exercises: "Sent goblet • Remo • Combos débiles" },
            { id: "cd",  title: "Cool-down",       duration: 600, type: "cooldown", exercises: "Caminata • Stretching • Respiración" }
        ]},
        4: { name: "Control + Técnica", blocks: [
            { id: "w",   title: "Activación",     duration: 300, type: "warmup",   exercises: "Golpes suave 1kg • Rodillas suave • Movilidad" },
            { id: "c1q", title: "Ciclo 1 Quema",  duration: 420, type: "cardio",   exercises: "Sent controlada • Lateral lunge • Stepping" },
            { id: "c1f", title: "Ciclo 1 Fuerza", duration: 180, type: "strength", exercises: "Goblet Squat ultra lento 5kg" },
            { id: "c2q", title: "Ciclo 2 Quema",  duration: 420, type: "cardio",   exercises: "Deadlift suave • Hip thrust • Reverse lunge" },
            { id: "c2f", title: "Ciclo 2 Fuerza", duration: 180, type: "strength", exercises: "Peso muerto TEMPO 5kg" },
            { id: "c3q", title: "Ciclo 3 Quema",  duration: 420, type: "cardio",   exercises: "Press suave • Lateral raise • Golpe suave" },
            { id: "c3f", title: "Ciclo 3 Fuerza", duration: 180, type: "strength", exercises: "Press overhead ESTRICTO 5kg" },
            { id: "c4q", title: "Ciclo 4 Quema",  duration: 420, type: "cardio",   exercises: "Remo suave • Plank • Tracción suave" },
            { id: "c4f", title: "Ciclo 4 Fuerza", duration: 180, type: "strength", exercises: "Remo bilateral CON APRIETE 5kg" },
            { id: "c5q", title: "Ciclo 5 Quema",  duration: 300, type: "cardio",   exercises: "Sent • Punch • Lunge" },
            { id: "c5f", title: "Ciclo 5 Fuerza", duration: 300, type: "strength", exercises: "Movimientos débiles CONTROL PURO 5kg" },
            { id: "cd",  title: "Cool-down",       duration: 600, type: "cooldown", exercises: "Caminata • Stretching • Respiración" }
        ]}
    };

    // ── ESTADO ────────────────────────────────────────────────
    let currentRoutine = 1;
    let selectedDate = new Date();
    let workoutData = {};
    let fastingState = { seconds: 0, offset: 0, started: false, startedAt: null };
    let wstate = { started: false, done: new Set() };
    let wint = {};
    let totalSeconds = 0;
    let totalInterval = null;
    let fastingInterval = null;
    let saveTimeout = null;

    // ── SUPABASE ──────────────────────────────────────────────
    async function loadFromSupabase() {
        setSyncStatus('syncing', 'cargando...');
        try {
            const { data, error } = await sb.from('flow_data').select('*').eq('id', 1);
            if (error) throw error;
            if (!data || data.length === 0) {
                await sb.from('flow_data').insert({ id: 1, workout_data: {}, fasting_state: {} });
                setSyncStatus('ok', 'listo');
                return;
            }
            const row = data[0];
            if (row.workout_data) workoutData = row.workout_data;
            if (row.fasting_state && Object.keys(row.fasting_state).length > 0) {
                const fs = row.fasting_state;
                fastingState.seconds   = fs.seconds   || 0;
                fastingState.offset    = fs.offset    || 0;
                fastingState.started   = fs.started   || false;
                fastingState.startedAt = fs.startedAt || null;
                if (fastingState.started && fastingState.startedAt) {
                    const elapsed = Math.floor((Date.now() - new Date(fastingState.startedAt).getTime()) / 1000);
                    fastingState.seconds += elapsed;
                    fastingState.startedAt = new Date().toISOString();
                }
            }
            setSyncStatus('ok', 'sync');
        } catch (e) {
            console.error('Load error:', e);
            setSyncStatus('error', 'sin conexión');
        }
    }

    async function saveToSupabase() {
        setSyncStatus('syncing', 'guardando...');
        try {
            const { error } = await sb.from('flow_data').upsert({
                id: 1,
                workout_data: workoutData,
                fasting_state: {
                    seconds: fastingState.seconds,
                    offset: fastingState.offset,
                    started: fastingState.started,
                    startedAt: fastingState.startedAt
                },
                updated_at: new Date().toISOString()
            });
            if (error) throw error;
            setSyncStatus('ok', 'sync');
        } catch (e) {
            console.error('Save error:', e);
            setSyncStatus('error', 'sin sync');
        }
    }

    function debouncedSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveToSupabase, 1500);
    }

    // ── CALENDARIO ────────────────────────────────────────────
    function getDateStr(d) {
        return d.getFullYear() + '-' +
               String(d.getMonth() + 1).padStart(2, '0') + '-' +
               String(d.getDate()).padStart(2, '0');
    }

    function renderCal() {
        const c = document.getElementById('calendar-week');
        c.innerHTML = '';
        const today = new Date();
        const todayStr = getDateStr(today);
        const selStr   = getDateStr(selectedDate);

        for (let i = 6; i >= 0; i--) {
            const d  = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
            const ds = getDateStr(d);
            const btn = document.createElement('button');
            btn.className = 'calendar-day';
            btn.textContent = d.getDate();
            if (ds === todayStr) btn.classList.add('today');
            if (ds === selStr)   btn.classList.add('selected');
            const dd = workoutData[ds];
            if (dd && dd.completed) btn.classList.add('workout-done');
            if (dd && dd.fasting)   btn.classList.add('fasting-done');
            btn.dataset.ds = ds;
            btn.onclick = function() {
                const p = this.dataset.ds.split('-');
                changeDate(new Date(+p[0], +p[1] - 1, +p[2]));
            };
            c.appendChild(btn);
        }
    }

    // ── RUTINAS ───────────────────────────────────────────────
    function usedThisWeek(routineId) {
        for (let i = 0; i < 7; i++) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const ds = getDateStr(d);
            if (workoutData[ds] && workoutData[ds].r === routineId && workoutData[ds].completed) return true;
        }
        return false;
    }

    function renderRoutine() {
        const r = document.getElementById('routine-selector');
        r.innerHTML = '';
        Object.keys(routineData).forEach(id => {
            const rid = parseInt(id);
            const used = usedThisWeek(rid);
            const btn = document.createElement('button');
            btn.className = 'routine-btn' + (rid === currentRoutine ? ' active' : '');
            btn.innerHTML = `Op.${id}${used ? ' <span class="routine-check">✓</span>' : ''}`;
            btn.onclick = () => { currentRoutine = rid; renderRoutine(); reset(); renderTL(); };
            r.appendChild(btn);
        });
    }

    // ── TIMELINE ──────────────────────────────────────────────
    function renderTL() {
        const t = document.getElementById('timeline-container');
        t.innerHTML = '';
        routineData[currentRoutine].blocks.forEach((b, i) => {
            const el = document.createElement('div');
            el.className = 'timeline-block' + (wstate.done.has(b.id) ? ' completed' : '');
            const m = Math.floor(b.duration / 60), s = b.duration % 60;
            const icon = b.type === 'cardio' ? '🔥' : b.type === 'strength' ? '💪' : b.type === 'warmup' ? '↻' : '✓';
            el.innerHTML = `
                <div class="block-row">
                    <div class="block-info">
                        <div class="block-title">${b.title}</div>
                        <div class="block-exercises">${b.exercises}</div>
                    </div>
                    <div class="block-timer">
                        <div class="timer-main" id="tmr${i}">${m}:${String(s).padStart(2,'0')}</div>
                        <div class="timer-type">${icon}</div>
                    </div>
                </div>
                <button class="btn-mark" id="mark${i}" onclick="togDone(${i},'${b.id}')">
                    <div class="btn-mark-fill" id="prg${i}"></div>
                    <span id="marklbl${i}">MARCAR</span>
                </button>`;
            t.appendChild(el);
        });
    }

    // ── FECHA / STATS ─────────────────────────────────────────
    function updateDate() {
        document.getElementById('current-date').textContent =
            selectedDate.toLocaleDateString('es-ES', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
    }

    function updateStats() {
        const todayStr = getDateStr(new Date());
        let streak = 0, week = 0;
        for (let i = 0; i < 365; i++) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const ds = getDateStr(d);
            if (workoutData[ds]) { streak++; } else if (i > 0) break;
            if (i < 7 && workoutData[ds]) week++;
        }
        document.getElementById('stat-streak').textContent = streak;
        document.getElementById('stat-total').textContent  = Object.keys(workoutData).length;
        document.getElementById('stat-week').textContent   = week;
        document.getElementById('stat-today').textContent  = workoutData[todayStr] ? `D${workoutData[todayStr].r}` : '—';
    }

    // ── AYUNO ─────────────────────────────────────────────────
    function renderFastingTicks() {
        const container = document.getElementById('fasting-ticks');
        container.innerHTML = '';
        // Mostrar ticks para etapas desde la 2ª en adelante (excluir hora 0)
        fastingStages.slice(1).forEach(s => {
            const pct = (s.hours / FASTING_MAX_H) * 100;
            const tick = document.createElement('div');
            tick.className = 'fasting-tick';
            tick.id = `ftick-${s.hours}`;
            tick.style.left = pct + '%';
            const isLast = s.hours === FASTING_MAX_H;
            if (isLast) tick.style.transform = 'translateX(-90%)';
            tick.innerHTML = `<div class="fasting-tick-line"></div><div class="fasting-tick-label">${s.hours}h<br>${s.name}</div>`;
            container.appendChild(tick);
        });
    }

    function updateFasting() {
        const total = fastingState.seconds + (fastingState.offset * 3600);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        document.getElementById('fasting-time').textContent =
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

        // Meta: hora de inicio real (restando offset) 
        const metaEl = document.getElementById('fasting-meta');
        if (metaEl) {
            const lines = [];
            if (fastingState.startedAt) {
                const start = new Date(fastingState.startedAt);
                // Hora de inicio real = hora en que se pulsó Iniciar - offset aplicado
                const realStart = new Date(start.getTime() - (fastingState.offset * 3600000));
                lines.push('Inicio real: ' + realStart.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }));
                if (fastingState.offset > 0) {
                    const oh = Math.floor(fastingState.offset);
                    const om = Math.round((fastingState.offset - oh) * 60);
                    lines.push(`+${String(oh).padStart(2,'0')}:${String(om).padStart(2,'0')} offset`);
                }
            }
            metaEl.textContent = lines.join('  ·  ');
        }

        // Etapa actual
        let currentStage = fastingStages[0];
        for (let i = 0; i < fastingStages.length; i++) {
            if (h >= fastingStages[i].hours) currentStage = fastingStages[i];
        }
        document.getElementById('fasting-stage-name').textContent = currentStage.name;
        document.getElementById('fasting-stage-desc').textContent = currentStage.desc;

        // Barra de progreso
        const pct = Math.min((h / FASTING_MAX_H) * 100, 100);
        document.getElementById('fasting-fill').style.width = pct + '%';

        // Ticks
        fastingStages.slice(1).forEach(s => {
            const tick = document.getElementById(`ftick-${s.hours}`);
            if (!tick) return;
            const reached = h >= s.hours;
            const isCurrent = currentStage.hours === s.hours;
            tick.classList.toggle('reached', reached);
            tick.classList.toggle('current', isCurrent);
        });
    }

    function startFastingTimer() {
        if (fastingInterval) clearInterval(fastingInterval);
        fastingInterval = setInterval(() => {
            if (fastingState.started) { fastingState.seconds++; updateFasting(); }
        }, 1000);
    }

    document.getElementById('btn-fasting-start').onclick = () => {
        fastingState.started = !fastingState.started;
        const btn = document.getElementById('btn-fasting-start');
        btn.textContent = fastingState.started ? 'Pausar' : 'Iniciar';
        btn.classList.toggle('active', fastingState.started);
        if (fastingState.started) fastingState.startedAt = new Date().toISOString();
        debouncedSave();
    };

    function updateFastingLog() {
        const logEl = document.getElementById('fasting-log');
        if (!logEl) return;
        const ds = getDateStr(new Date());
        const dayData = workoutData[ds];
        if (dayData && dayData.fasting) {
            const f = dayData.fasting;
            const h = Math.floor(f.totalSeconds / 3600);
            const m = Math.floor((f.totalSeconds % 3600) / 60);
            logEl.textContent = `✓ Ayuno cerrado: ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m · ${f.closedAt}`;
        } else {
            logEl.textContent = '';
        }
    }

    document.getElementById('btn-fasting-close').onclick = () => {
        const total = fastingState.seconds + (fastingState.offset * 3600);
        if (total < 60) return; // ignorar si es menos de 1 min
        // Pausar
        fastingState.started = false;
        const startBtn = document.getElementById('btn-fasting-start');
        startBtn.textContent = 'Iniciar';
        startBtn.classList.remove('active');
        // Registrar en workoutData del día actual
        const ds = getDateStr(new Date());
        const now = new Date();
        const closedAt = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        if (!workoutData[ds]) workoutData[ds] = {};
        workoutData[ds].fasting = {
            totalSeconds: Math.floor(total),
            closedAt: closedAt,
            date: ds
        };
        updateFastingLog();
        debouncedSave();
    };

    document.getElementById('btn-fasting-reset').onclick = () => {
        fastingState = { seconds: 0, offset: 0, started: false, startedAt: null };
        const btn = document.getElementById('btn-fasting-start');
        btn.textContent = 'Iniciar';
        btn.classList.remove('active');
        document.getElementById('offset-h').value = 0;
        document.getElementById('offset-m').value = 0;
        updateFasting();
        debouncedSave();
    };

    document.getElementById('btn-offset-apply').onclick = () => {
        const oh = parseInt(document.getElementById('offset-h').value) || 0;
        const om = parseInt(document.getElementById('offset-m').value) || 0;
        fastingState.offset = oh + (om / 60);
        updateFasting();
        debouncedSave();
    };

    // ── WORKOUT ───────────────────────────────────────────────
    window.togDone = function(idx, id) {
        if (wstate.done.has(id)) wstate.done.delete(id); else wstate.done.add(id);
        updateMarkBtn(idx, id);
        const block = document.querySelectorAll('.timeline-block')[idx];
        if (wstate.done.has(id)) { block.classList.add('completed'); }
        else { block.classList.remove('completed'); }
        // Guardar siempre el estado de bloques del día seleccionado
        const ds = getDateStr(selectedDate);
        const doneArr = Array.from(wstate.done);
        const allDone = routineData[currentRoutine].blocks.every(b => wstate.done.has(b.id));
        workoutData[ds] = { r: currentRoutine, done: doneArr, completed: allDone };
        updateStats(); renderCal(); debouncedSave();
    };

    function updateMarkBtn(idx, id) {
        const btn  = document.getElementById(`mark${idx}`);
        const fill = document.getElementById(`prg${idx}`);
        const lbl  = document.getElementById(`marklbl${idx}`);
        if (!btn) return;
        const done = wstate.done.has(id);
        btn.classList.toggle('done', done);
        if (fill) fill.classList.toggle('done', done);
        if (lbl)  lbl.textContent = done ? '✓ HECHO' : 'MARCAR';
    }

    function updateTotalTimer() {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        const el = document.getElementById('workout-total-time');
        if (el) el.textContent = h > 0
            ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
            : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateWorkoutMeta(blockIdx) {
        const meta = document.getElementById('workout-meta');
        if (!meta) return;
        const rt = routineData[currentRoutine];
        if (blockIdx >= rt.blocks.length) { meta.textContent = ''; return; }
        const b = rt.blocks[blockIdx];
        const icon = b.type === 'cardio' ? '🔥' : b.type === 'strength' ? '💪' : b.type === 'warmup' ? '↻' : '✓';
        const next = rt.blocks[blockIdx + 1];
        meta.innerHTML = `<span class="accent">${icon} ${b.title}</span> · ${b.exercises}${next ? ` <span style="color:var(--text-secondary);opacity:0.6"> → siguiente: ${next.title}</span>` : ''}`;
    }

    function toggleWk() {
        wstate.started = !wstate.started;
        const btnW = document.getElementById('btn-start-workout');
        btnW.textContent = wstate.started ? 'PAUSAR' : 'INICIAR';
        btnW.classList.toggle('paused', wstate.started);
        if (wstate.started) {
            totalInterval = setInterval(() => { totalSeconds++; updateTotalTimer(); }, 1000);
            startSeq();
        } else {
            clearInterval(totalInterval);
            stopSeq();
        }
    }

    function startSeq() {
        const rt = routineData[currentRoutine];
        let idx = 0;
        updateWorkoutMeta(0);
        function next() {
            updateWorkoutMeta(idx);
            if (!wstate.started || idx >= rt.blocks.length) {
                wstate.started = false;
                clearInterval(totalInterval);
                const btnW = document.getElementById('btn-start-workout');
                btnW.textContent = '✓ COMPLETADO';
                btnW.classList.remove('paused');
                btnW.classList.add('done');
                const metaEl = document.getElementById('workout-meta');
                if (metaEl) {
                    const th = Math.floor(totalSeconds/3600), tm = Math.floor((totalSeconds%3600)/60);
                    metaEl.innerHTML = `<span class="accent">✓ Completado</span> · Tiempo total: ${th > 0 ? th+'h ' : ''}${tm}min`;
                }
                const ds = getDateStr(selectedDate);
                workoutData[ds] = { r: currentRoutine, done: Array.from(wstate.done), completed: true };
                updateStats(); renderCal(); debouncedSave();
                return;
            }
            const b = rt.blocks[idx];
            let rem = b.duration;
            const te = document.getElementById(`tmr${idx}`);
            const pe = document.getElementById(`prg${idx}`);
            if (te) { te.classList.add('timer-active'); te.textContent = `${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`; }
            wint[idx] = setInterval(() => {
                rem--;
                if (te) te.textContent = `${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
                if (pe) pe.style.width = ((b.duration - rem) / b.duration * 100) + '%';
                if (rem <= 0) {
                    clearInterval(wint[idx]);
                    if (te) te.classList.remove('timer-active');
                    if (pe) { pe.classList.add('done'); pe.style.width = '100%'; }
                    wstate.done.add(b.id);
                    updateMarkBtn(idx, b.id);
                    const blk = document.querySelectorAll('.timeline-block')[idx];
                    if (blk) blk.classList.add('completed');
                    const ds2 = getDateStr(selectedDate);
                    workoutData[ds2] = { r: currentRoutine, done: Array.from(wstate.done), completed: false };
                    debouncedSave();
                    idx++; next();
                }
            }, 1000);
        }
        next();
    }

    function stopSeq() { Object.values(wint).forEach(i => clearInterval(i)); }

    function reset() {
        stopSeq();
        clearInterval(totalInterval);
        totalSeconds = 0;
        wstate.started = false; wstate.done = new Set();
        const btnW = document.getElementById('btn-start-workout');
        btnW.textContent = 'INICIAR';
        btnW.classList.remove('paused', 'done');
        updateTotalTimer();
        const metaEl = document.getElementById('workout-meta');
        if (metaEl) metaEl.textContent = '';
        renderTL();
    }

    document.getElementById('btn-start-workout').onclick = toggleWk;
    document.getElementById('btn-reset-workout').onclick = reset;
    function changeDate(newDate) {
        selectedDate = newDate;
        wstate.started = false;
        stopSeq();
        clearInterval(totalInterval);
        totalSeconds = 0;
        updateTotalTimer();
        const btnW = document.getElementById('btn-start-workout');
        btnW.textContent = 'INICIAR';
        btnW.classList.remove('paused', 'done');
        const metaEl = document.getElementById('workout-meta');
        if (metaEl) metaEl.textContent = '';
        // Cargar bloques completados del día seleccionado
        const ds = getDateStr(selectedDate);
        const dayData = workoutData[ds];
        wstate.done = new Set(dayData && dayData.done ? dayData.done : []);
        updateDate(); renderCal(); updateStats(); renderTL();
    }

    document.getElementById('btn-prev-day').onclick = () => { const d = new Date(selectedDate); d.setDate(d.getDate() - 1); changeDate(d); };
    document.getElementById('btn-today').onclick    = () => { changeDate(new Date()); };
    document.getElementById('btn-next-day').onclick = () => { const d = new Date(selectedDate); d.setDate(d.getDate() + 1); changeDate(d); };

    // ── INIT ──────────────────────────────────────────────────
    async function init() {
        setSyncStatus('syncing', 'conectando...');
        await loadFromSupabase();
        // Cargar bloques completados del día actual
        const todayDs = getDateStr(selectedDate);
        const todayData = workoutData[todayDs];
        wstate.done = new Set(todayData && todayData.done ? todayData.done : []);
        // Restaurar estado del botón si el día ya estaba completado
        if (todayData && todayData.completed) {
            const btnW = document.getElementById('btn-start-workout');
            btnW.textContent = '✓ COMPLETADO';
            btnW.classList.add('done');
        }
        updateDate(); renderCal(); renderRoutine(); renderTL(); updateStats();
        renderFastingTicks(); updateFasting(); startFastingTimer(); updateFastingLog();
        if (fastingState.offset > 0) {
            const oh = Math.floor(fastingState.offset);
            const om = Math.round((fastingState.offset - oh) * 60);
            document.getElementById('offset-h').value = oh;
            document.getElementById('offset-m').value = om;
        }
        if (fastingState.started) {
            document.getElementById('btn-fasting-start').textContent = 'Pausar';
            document.getElementById('btn-fasting-start').classList.add('active');
        }
    }

    init();
</script>
